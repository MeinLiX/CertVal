server:
  http_listen_port: 3200
  grpc_listen_port: 9095

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/traces
    pool:
      max_workers: 100
      queue_depth: 10000

usage_report:
  reporting_enabled: false

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    service_graphs:
      dimensions: [http.method, http.route]
    span_metrics:
      dimensions: [http.method, http.route]

compactor:
  compaction:
    block_retention: 24h

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
