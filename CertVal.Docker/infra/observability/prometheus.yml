global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: ".*"
        action: keep
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["certval.rabbitmq:15692"]
  - job_name: "minio"
    metrics_path: /minio/metrics/v3
    static_configs:
      - targets: ["certval.minio:9000"]

