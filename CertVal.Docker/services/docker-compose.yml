name: certval-services

services:
  certval.apiservice:
    image: ${DOCKER_REGISTRY}certvalapiservice
    build:
      context: ../../
      dockerfile: CertVal.ApiService/Dockerfile
    ports:
      - "${APISERVICE_HTTP_PORT}:8080"
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_HTTP_PORTS=${APISERVICE_HTTP_PORT}
      - "ConnectionStrings__CertVal-database=Host=certval.postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "ConnectionStrings__CertVal-rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@certval.rabbitmq:5672/"
      - "ConnectionStrings__CertVal-minio=Endpoint=http://certval.minio:9000;AccessKey=${MINIO_ROOT_USER};SecretKey=${MINIO_ROOT_PASSWORD}"
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=${JwtSettings__Issuer}
      - JwtSettings__Audience=${JwtSettings__Audience}
      - JwtSettings__ExpiryHours=${JwtSettings__ExpiryHours}
      - Cors__AllowedOrigins__0=${Cors__AllowedOrigins__0}
      - Cors__AllowedOrigins__1=${Cors__AllowedOrigins__1}
      - CertificateStorage__BucketName=${CertificateStorage__BucketName}
      - CertificateStorage__UseWorkspacePrefixes=${CertificateStorage__UseWorkspacePrefixes}
      - CertificateStorage__DeleteOnCertificateRemoval=${CertificateStorage__DeleteOnCertificateRemoval}
      - CertificateStorage__MaxFileSize=${CertificateStorage__MaxFileSize}
      - NotificationSettings__ProcessingInterval=${NotificationSettings__ProcessingInterval}
      - NotificationSettings__MaxRetryAttempts=${NotificationSettings__MaxRetryAttempts}
      - NotificationSettings__RetryDelay=${NotificationSettings__RetryDelay}
      - Messaging__ExchangeName=${Messaging__ExchangeName}
      - Messaging__EmailQueueName=${Messaging__EmailQueueName}
      - Messaging__EmailRoutingKey=${Messaging__EmailRoutingKey}
      - Messaging__DurableQueues=${Messaging__DurableQueues}
      - Messaging__PersistentMessages=${Messaging__PersistentMessages}
      - Messaging__MaxRetryAttempts=${Messaging__MaxRetryAttempts}
      - Messaging__RetryDelay=${Messaging__RetryDelay}
      - Messaging__ConnectionTimeout=${Messaging__ConnectionTimeout}
      - Messaging__MaxConnectionRetries=${Messaging__MaxConnectionRetries}
      - GoogleAuth__ClientId=${PUBLIC_GOOGLE_CLIENT_ID}
      - Minio__Endpoint=http://certval.minio:9000
      - Minio__AccessKey=${MINIO_ROOT_USER}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD}
      - Minio__UseSSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_METRIC_EXPORT_INTERVAL=10000
    networks:
      - certval-net

  certval.emailservice:
    image: ${DOCKER_REGISTRY}certvalemailservice
    build:
      context: ../../
      dockerfile: CertVal.EmailService/Dockerfile
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT}
      - "ConnectionStrings__CertVal-rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@certval.rabbitmq:5672/"
      - EmailService__Smtp__Host=${EmailService__Smtp__Host}
      - EmailService__Smtp__Port=${EmailService__Smtp__Port}
      - EmailService__Smtp__UseSsl=${EmailService__Smtp__UseSsl}
      - EmailService__Smtp__SslMode=${EmailService__Smtp__SslMode}
      - EmailService__Smtp__Username=${EmailService__Smtp__Username}
      - EmailService__Smtp__Password=${EmailService__Smtp__Password}
      - EmailService__Smtp__FromEmail=${EmailService__Smtp__FromEmail}
      - EmailService__Smtp__FromName=${EmailService__Smtp__FromName}
      - EmailService__SupportEmail=${EmailService__SupportEmail}
      - EmailService__CompanyName=${EmailService__CompanyName}
      - EmailService__BaseUrl=${EmailService__BaseUrl}
      - EmailService__MaxRetryAttempts=${EmailService__MaxRetryAttempts}
      - EmailService__RetryDelay=${EmailService__RetryDelay}
      - Messaging__ExchangeName=${Messaging__ExchangeName}
      - Messaging__EmailQueueName=${Messaging__EmailQueueName}
      - Messaging__EmailRoutingKey=${Messaging__EmailRoutingKey}
      - Messaging__DurableQueues=${Messaging__DurableQueues}
      - Messaging__PersistentMessages=${Messaging__PersistentMessages}
      - Messaging__MaxRetryAttempts=${Messaging__MaxRetryAttempts}
      - Messaging__RetryDelay=${Messaging__RetryDelay}
      - Messaging__ConnectionTimeout=${Messaging__ConnectionTimeout}
      - Messaging__MaxConnectionRetries=${Messaging__MaxConnectionRetries}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_METRIC_EXPORT_INTERVAL=10000
    networks:
      - certval-net

  certval.web:
    image: ${DOCKER_REGISTRY}certvalweb
    build:
      context: ../../
      dockerfile: CertVal.Web/Dockerfile
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
        PUBLIC_GOOGLE_CLIENT_ID: ${PUBLIC_GOOGLE_CLIENT_ID}
    ports:
      - "${WEB_HTTP_PORT}:3000"
    environment:
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL}
      - PUBLIC_GOOGLE_CLIENT_ID=${PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      certval.apiservice:
        condition: service_started
    restart: unless-stopped
    networks:
      - certval-net
